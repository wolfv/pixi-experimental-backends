[workspace]
channels = [
  "https://prefix.dev/pixi-experimental-backends",
  "https://prefix.dev/conda-forge",
]
# autotools on Windows requires a full MSYS2 environment; linux/mac only
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
preview = ["pixi-build"]

[package]
name = "xz"
version = "5.6.3"
description = "XZ Utils - general-purpose lossless data compression"
license = "GPL-2.0-or-later AND LGPL-2.1-or-later"

[package.build.source]
git = "https://github.com/tukaani-project/xz.git"
tag = "v5.6.3"

[package.build.backend]
name = "pixi-build-autotools"
version = ">=0.1.0"

[package.build.config]
# The git checkout only has configure.ac; autoreconf generates ./configure
autoreconf = true
compilers = ["c"]
